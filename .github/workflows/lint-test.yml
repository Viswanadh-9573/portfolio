name: HTML CSS Check

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  check:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20


    - name: Install HTML and CSS lint tools
      run: |
        npm install -g htmlhint stylelint stylelint-config-standard


    - name: Check HTML
      run: |
        htmlhint index.html


    - name: Check CSS
      run: |
        stylelint "**/*.css"


    - name: Basic file test
      run: |
        test -f index.html
        echo "index.html exists"